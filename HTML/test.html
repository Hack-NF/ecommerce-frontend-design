<!DOCTYPE html>
<html>

<head>
    <title>Navbar</title>
</head>

<body>

    <!-- 🔴 STEP 1: TOP HEADER (Logo + Search + Icons) -->
    <div style="display:flex; align-items:center; justify-content:space-between; padding:15px 40px; border-bottom:1px solid #ccc;">

        <!-- Logo -->
        <div style="display:flex; align-items:center;">
            <div style="background:#4a7aff; color:white; padding:8px; border-radius:5px; margin-right:8px;">
                ▢
            </div>
            <span style="font-size:28px; font-weight:bold; color:#4a7aff;">Brand</span>
        </div>

        <!-- Search -->
        <div style="display:flex; width:50%;">
            <input type="text" placeholder="Search"
                style="width:60%; padding:8px; border:1px solid #4a7aff;">

            <select style="padding:8px; border:1px solid #4a7aff;">
                <option>All category</option>
            </select>

            <button style="background:#4a7aff; color:white; padding:8px 15px; border:none;">
                Search
            </button>
        </div>

        <!-- Icons -->
        <div style="display:flex; gap:25px; align-items:center;">
            <div style="text-align:center; font-size:13px;">
              <div style="font-size:18px;">👤</div>
               Profile
            </div>
            <div style="text-align:center; font-size:13px;">
              <div style="font-size:18px;">💬</div>
               Message
            </div>
            <div style="text-align:center; font-size:13px;">
              <div style="font-size:18px;">📦</div>
               Orders
            </div>
            <div style="text-align:center; font-size:13px;">
              <div style="font-size:18px;">🛒</div>
               My cart
            </div>
        </div>

    </div>


    <!-- 🔵 STEP 2: SECOND NAVBAR -->
    <div style="display:flex; justify-content:space-between; padding:10px 40px; border-bottom:2px solid #4a7aff;">

        <!-- Left -->
        <div style="display:flex; gap:20px;">
            <span>☰ All category</span>
            <span>Hot offers</span>
            <span>Gift boxes</span>
            <span>Projects</span>
            <span>Menu item</span>
            <span>Help</span>
        </div>

        <!-- Right -->
        <div style="display:flex; gap:25px;">
            <span>
                <select>
                    <option>English, USD</option>
                </select> 
            </span>
            <span>
                Ship to 
                <img src="https://flagcdn.com/w20/de.png" style="vertical-align:middle; margin-left:5px;">
                ▼
            </span>
        </div>

    </div>

</body>

</html>

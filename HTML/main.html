<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ecommerce</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- TOP HEADER -->
<div class="top-header py-2">
  <div class="container d-flex align-items-center justify-content-between">

    <!-- LOGO -->
    <div class="logo d-flex align-items-center">
      <div class="logo-box">🛍️</div>
      <h5 class="ms-2 mb-0">Brand</h5>
    </div>

    <!-- SEARCH BAR -->
    <div class="search-box d-flex">
      <input type="text" class="form-control" placeholder="Search">
      
      <select class="form-select">
        <option>All category</option>
      </select>

      <button class="btn btn-primary">Search</button>
    </div>

    <!-- ICONS -->
    <div class="icons d-flex">
        <div class="icon-item text-center">
          <div>👤</div>
          <small>Profile</small>
        </div>

        <div class="icon-item text-center">
          <div>💬</div>
          <small>Message</small>
        </div>

        <div class="icon-item text-center">
          <div>❤️</div>
          <small>Orders</small>
        </div>

        <div class="icon-item text-center">
          <div>🛒</div>
          <small>My cart</small>
        </div>
      </div>

  </div>
</div>

<!-- NAVBAR -->
<div class="main-nav py-2">
  <div class="container d-flex justify-content-between align-items-center flex-wrap">

    <!-- LEFT MENU -->
    <div class="menu">
      <span class="me-3">☰ All category</span>
      <span class="me-3">Hot offers</span>
      <span class="me-3">Gift boxes</span>
      <span class="me-3">Projects</span>
      <span class="me-3">Menu item</span>
      <span>Help</span>
    </div>

    <!-- RIGHT -->
    <div>
      <span class="me-3">English, USD</span>
      <span>Ship to 🇩🇪</span>
    </div>

  </div>
</div>

</body>
</html>
